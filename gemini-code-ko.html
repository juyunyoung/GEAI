<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative AI Leader 모의시험</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2433; --sub:#5b6478;
    --line:#e3e7f0; --brand:#1a73e8; --brand-d:#1558c0;
    --green:#188038; --green-bg:#e6f4ea; --red:#c5221f; --red-bg:#fce8e6;
    --amber:#e37400; --shadow:0 1px 3px rgba(20,30,60,.08),0 8px 24px rgba(20,30,60,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",Roboto,"Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 64px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px 22px}
  h1{font-size:1.5rem;margin:0 0 4px;letter-spacing:-.3px}
  .tag{display:inline-block;font-size:.72rem;font-weight:700;color:var(--brand);background:#e8f0fe;
    padding:4px 10px;border-radius:999px;margin-bottom:14px}
  p.lead{color:var(--sub);margin:.2rem 0 1.4rem;font-size:.95rem}
  .opt-group{margin:18px 0}
  .opt-group h3{font-size:.85rem;color:var(--sub);font-weight:600;margin:0 0 8px}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{flex:1;min-width:90px;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:11px 10px;border-radius:12px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s}
  .seg button.active{border-color:var(--brand);background:#e8f0fe;color:var(--brand-d)}
  .seg button:hover{border-color:var(--brand)}
  .btn{display:inline-block;width:100%;border:none;background:var(--brand);color:#fff;font-size:1rem;
    font-weight:700;padding:14px;border-radius:14px;cursor:pointer;margin-top:18px;transition:.15s}
  .btn:hover{background:var(--brand-d)}
  .btn.ghost{background:#fff;color:var(--brand);border:1.5px solid var(--brand)}
  .btn.ghost:hover{background:#f0f5ff}
  .btn-row{display:flex;gap:10px}
  .btn-row .btn{margin-top:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:.82rem;color:var(--sub)}
  .bar{height:8px;background:#e8ebf3;border-radius:999px;overflow:hidden;margin-bottom:20px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#4285f4,#1a73e8);border-radius:999px;transition:width .3s}
  .qnum{font-weight:700;color:var(--ink)}
  .qtext{font-size:1.08rem;font-weight:600;margin:6px 0 6px;letter-spacing:-.2px}
  #hint{font-size:.82rem;color:var(--brand-d);font-weight:700;margin:0 0 14px;min-height:0}
  #hint:empty{margin:0}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);background:#fff;
    border-radius:14px;padding:14px 14px;cursor:pointer;transition:.12s;text-align:left;font-size:.97rem;width:100%}
  .choice:hover{border-color:var(--brand);background:#fafcff}
  .choice .dot{flex:none;width:22px;height:22px;border-radius:50%;border:2px solid #c6ccd8;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff}
  .choice.sel{border-color:var(--brand);background:#e8f0fe}
  .choice.sel .dot{border-color:var(--brand);background:var(--brand)}
  .choice.correct{border-color:var(--green);background:var(--green-bg)}
  .choice.correct .dot{border-color:var(--green);background:var(--green)}
  .choice.wrong{border-color:var(--red);background:var(--red-bg)}
  .choice.wrong .dot{border-color:var(--red);background:var(--red)}
  .choice[disabled]{cursor:default}
  .explain{margin-top:16px;border-radius:14px;padding:14px 16px;font-size:.92rem;display:none}
  .explain.show{display:block}
  .explain.ok{background:var(--green-bg);border:1px solid #b7e1c1}
  .explain.no{background:var(--red-bg);border:1px solid #f3c0bd}
  .explain b{display:block;margin-bottom:4px}
  .explain .ans{color:var(--green);font-weight:700}
  .score-ring{width:150px;height:150px;margin:6px auto 14px;border-radius:50%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:conic-gradient(var(--brand) var(--p),#e8ebf3 0)}
  .score-ring > div{width:118px;height:118px;border-radius:50%;background:#fff;display:flex;flex-direction:column;
    align-items:center;justify-content:center}
  .score-ring .pct{font-size:2rem;font-weight:800;line-height:1}
  .score-ring .sub{font-size:.78rem;color:var(--sub)}
  .verdict{text-align:center;font-size:1.15rem;font-weight:800;margin:6px 0}
  .verdict.pass{color:var(--green)} .verdict.fail{color:var(--amber)}
  .stat{display:flex;justify-content:center;gap:24px;margin:14px 0 4px;font-size:.9rem;color:var(--sub)}
  .stat b{display:block;font-size:1.3rem;color:var(--ink)}
  .review h3{font-size:1rem;margin:22px 0 10px}
  .rev-item{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;font-size:.9rem}
  .rev-item .q{font-weight:600;margin-bottom:7px}
  .rev-item .yours{color:var(--red)} .rev-item .right{color:var(--green);font-weight:600}
  .rev-item .ex{color:var(--sub);margin-top:6px;font-size:.86rem}
  .hide{display:none}
  .foot{text-align:center;color:#9aa3b6;font-size:.75rem;margin-top:22px}
</style>
</head>
<body>
<div class="wrap">

  <section id="start" class="card">
    <span class="tag">Google Cloud · 자격증 대비</span>
    <h1>Generative AI Leader 모의시험</h1>
    <p class="lead">실제 연습문제 103문항 기반. 반복 응시·자동 채점·해설을 제공합니다.</p>

    <div class="opt-group">
      <h3>문항 수</h3>
      <div class="seg" id="seg-count">
        <button data-v="20">20문항</button>
        <button data-v="40">40문항</button>
        <button class="active" data-v="93">전체 103문항</button>
      </div>
    </div>

    <div class="opt-group">
      <h3>채점 방식</h3>
      <div class="seg" id="seg-mode">
        <button class="active" data-v="instant">즉시 해설 (학습용)</button>
        <button data-v="exam">마지막 일괄 채점 (실전)</button>
      </div>
    </div>

    <div class="opt-group">
      <h3>문제 순서</h3>
      <div class="seg" id="seg-shuffle">
        <button class="active" data-v="1">랜덤 셔플</button>
        <button data-v="0">고정 순서</button>
      </div>
    </div>

    <button class="btn" onclick="startExam()">시험 시작</button>
    <div class="foot">합격 기준선은 학습 편의를 위해 75%로 설정되어 있습니다.</div>
  </section>

  <section id="quiz" class="card hide">
    <div class="topbar">
      <span class="qnum" id="qcount"></span>
      <span id="modeLabel"></span>
    </div>
    <div class="bar"><i id="prog"></i></div>
    <div class="qtext" id="qtext"></div>
    <div id="hint"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <button class="btn hide" id="nextBtn">다음</button>
  </section>

  <section id="result" class="card hide">
    <div class="score-ring" id="ring"><div>
      <span class="pct" id="pct"></span><span class="sub" id="ratio"></span>
    </div></div>
    <div class="verdict" id="verdict"></div>
    <div class="stat">
      <div>맞힘<b id="nCorrect"></b></div>
      <div>틀림<b id="nWrong"></b></div>
    </div>
    <div class="btn-row" style="margin-top:18px">
      <button class="btn ghost" onclick="location.reload()">설정 변경</button>
      <button class="btn" onclick="retry()">다시 풀기</button>
    </div>
    <div class="review" id="review"></div>
  </section>

  <div class="foot">© 연습용 시뮬레이터 · 실제 Google 시험 문제가 아닌 학습 보조 자료입니다.</div>
</div>

<script>
/* ===== 문제 데이터 (93문항 전체, 정제 완료) ===== */
const BANK = [
{q:"인사부서가 채용 지원서를 선별하는 생성형 AI 모델을 배포했습니다. 적격으로 보이는 일부 지원자가 계속 탈락하지만 AI는 순위·제외 사유를 설명하지 않습니다. 이 투명성 부족 문제를 해결하려면?",
 o:["더 크고 다양한 데이터셋을 수집한다.","생성형 AI 모델을 파인튜닝한다.","설명 가능한(explainable) 생성형 AI 정책을 도입한다.","공정성 평가를 개발한다."],
 a:2,e:"의사결정 '근거를 설명'하지 못하는 것이 핵심 문제이므로 설명가능성(Explainable AI)이 정답."},
{q:"기업이 운영과 고객 상호작용 강화를 위해 LLM 도입을 검토 중입니다. LLM의 주요 특징은?",
 o:["깊고 단일한 도메인 전문성이 필요한 고도로 특정한 기술 작업에 탁월하다.","작은 데이터셋에서 효과적으로 학습·일반화한다.","추가 프롬프팅 없이 강한 논리·문제해결 능력을 내재한다.","방대한 데이터로 학습되어 폭넓은 언어·맥락 이해와 다양한 작업 적응력을 가진다."],
 a:3,e:"LLM은 대규모 데이터로 사전학습되어 범용성·적응력이 특징입니다."},
{q:"AI 로봇이 도시 내 최적 배송 경로를 학습합니다. 빠르고 성공적인 배송엔 양(+)의 점수, 지연·실패엔 음(-)의 점수를 받아 시간이 지나며 개선됩니다. 어떤 머신러닝 유형인가요?",
 o:["지도학습 (Supervised)","딥러닝 (Deep learning)","비지도학습 (Unsupervised)","강화학습 (Reinforcement)"],
 a:3,e:"보상/벌점(점수) 피드백으로 시행착오를 통해 개선 → 강화학습."},
{q:"기업이 여러 부서의 복잡한 워크플로우 자동화와 의사결정 개선을 위해 AI 에이전트 도입을 고려합니다. 생성형 AI 시스템에서 AI 에이전트의 주요 기능은?",
 o:["고급 AI 모델 학습·실행을 위한 컴퓨팅 파워 제공","AI 모델과 상호작용하는 사용자 인터페이스","분석·도구 사용·의사결정을 통해 목표를 달성하는 스마트 시스템","AI 모델이 쓰는 데이터의 중앙 저장소"],
 a:2,e:"에이전트는 추론하고 도구를 사용하며 스스로 행동을 결정해 목표를 달성합니다."},
{q:"광고대행사가 전통적 촬영의 느림·비용 문제로, 텍스트에서 사실적인 이미지를 빠르게 다량 생성하려 합니다. 어떤 Google 파운데이션 모델을 써야 할까요?",
 o:["Gemini","Gemma","Veo","Imagen"],
 a:3,e:"텍스트→이미지 생성은 Imagen. Veo는 동영상, Gemini는 멀티모달 텍스트, Gemma는 경량 오픈모델."},
{q:"기업이 단일 기술 공급자 종속(lock-in)을 우려하며, 필요에 따라 다양한 AI 도구·플랫폼을 선택·통합하는 능력을 중시합니다. 이를 해결하는 Google Cloud의 고유 특성은?",
 o:["AI 제공에 있어 개방형(open) 접근 방식 강조","긴밀히 통합된 독점(proprietary) AI 솔루션","완전관리형 AI 서비스로 사용자 경험 단순화 전략","AI 워크플로우 자동화에 대한 주력"],
 a:0,e:"종속을 피하고 선택·통합 자유를 원하면 '개방성(openness)'이 핵심."},
{q:"컨설팅 리서치팀이 여러 장문의 보고서를 분석해 핵심 트렌드를 찾고 출처 간 정보를 연결해야 합니다. 각 문서의 핵심을 빠르게 이해하고 통찰을 정리하려면 어떤 Google Cloud 제품이 적합할까요?",
 o:["NotebookLM","Gemini 앱","Gemini Enterprise Agent Platform의 Agent Search","Gemini가 포함된 Google Workspace"],
 a:0,e:"업로드한 다수 문서를 근거로 요약·연결·출처 인용을 해주는 도구는 NotebookLM."},
{q:"식료품 체인이 판매·재고·마케팅 등 여러 내부 시스템에 데이터가 흩어져 있어 직원들이 검색에 시간을 낭비합니다. 시스템 전반의 데이터를 쉽게 접근·이해할 중앙 수단이 필요합니다. 어떤 제품을 써야 할까요?",
 o:["Gemini가 포함된 Google Workspace","Gemini Enterprise","Gemini Enterprise Agent Platform의 Agent Search","Conversational Agents"],
 a:1,e:"여러 엔터프라이즈 소스의 데이터를 직원이 통합 활용하도록 돕는 것은 Gemini Enterprise."},
{q:"여러 팀이 서로 다른 도구로 ML 프로젝트를 진행해 중복 작업·확장 문제가 발생합니다. AI 개발·배포·모니터링 전체를 효율적으로 관리할 중앙 플랫폼이 필요합니다. 어떤 제품을 써야 할까요?",
 o:["Cloud Functions","Vertex AI","BigQuery","Cloud Storage"],
 a:1,e:"ML 라이프사이클(개발·배포·모니터링) 전반을 통합 관리하는 플랫폼은 Vertex AI."},
{q:"소프트웨어 기업의 챗봇이 최근 출시 기능 질문에 잘 답하지 못합니다. 해당 정보가 원래 학습 데이터에 없기 때문입니다. 전체 재학습 없이 최신 제품 문서로 정확·최신 답변을 하게 하려면?",
 o:["파인튜닝 (Fine-tuning)","프롬프트 엔지니어링","검색 증강 생성 (RAG)","휴먼인더루프 (HITL)"],
 a:2,e:"재학습 없이 '외부 최신 문서를 검색해 근거로 답변'하게 하는 것은 RAG."},
{q:"비즈니스 분석가가 최근 시장에 진입한 작은 스타트업의 분기 매출을 생성형 AI에 물었습니다. 모델은 구체적 수치와 보도자료까지확신 있게 제시했지만, 실제로는 재무보고서도 보도자료도 존재하지 않았습니다. 그럴듯하지만 완전히 날조된 이 정보는 어떤 LLM 한계인가요?",
 o:["편향 (Bias)","지식 컷오프 (Knowledge cutoff)","데이터 의존성","환각 (Hallucinations)"],
 a:3,e:"사실이 아닌 정보를 그럴듯하게 '지어내는' 것은 환각. 지식 컷오프는 '특정 시점 이후 정보를 모름'으로 다릅니다."},
{q:"직원 정책 질문에 답하는 생성형 AI 도구가 오래되고 부정확한 정보를 제공해 혼란을 줍니다. 최신 공식 문서에 기반한 신뢰할 답변을 원합니다. 조직은 무엇을 해야 할까요?",
 o:["일반 지식의 광범위한 데이터셋으로 모델을 파인튜닝한다.","모델의 temperature 설정을 높인다.","그라운딩(grounding) 기법을 도입한다.","토큰 수 파라미터를 줄인다."],
 a:2,e:"답변을 신뢰할 수 있는 최신 사실 출처에 '연결'하는 것이 그라운딩."},
{q:"영업팀이 잠재 고객용 동적·맞춤형 영상 피치를 만들려 합니다. 다양한 형식의 고객 정보를 받아 고객별 요구에 맞춘 매력적인 영상 콘텐츠로 변환할 모델이 필요합니다. 어떤 Google 모델을 써야 할까요?",
 o:["Gemma","Gemini","Imagen","Veo"],
 a:3,e:"영상(video) 생성은 Veo."},
{q:"성장 중인 소매기업이 분산된 전화·이메일·기본 웹챗 지원을 하나로 통합하려 합니다. 통합 채널, 일관된 고객 경험, 보안·프라이버시를 보장하는 확장형 지원이 필요합니다. 어떤 제품을 써야 할까요?",
 o:["Gemini Enterprise Agent Platform","Google Cloud Contact Center as a Service (CCaaS)","Conversational AI","Gemini Enterprise Agent Platform의 Agent Search"],
 a:1,e:"멀티채널 고객 지원을 통합·확장하는 솔루션은 Contact Center as a Service(CCaaS)."},
{q:"여러 시스템에 흩어진 사내 정보를 직원이 더 잘 접근·활용하도록 하려 합니다. 이 시나리오에서 Gemini Enterprise의 핵심 이점은?",
 o:["AI 챗봇으로 외부 고객 참여 강화에 주력한다.","AI 모델 학습용 인프라·하드웨어를 직접 관리한다.","다양한 엔터프라이즈 소스의 데이터를 접근·이해하는 맞춤형 AI 에이전트를 만들어 직원이 사내 정보를 더 쉽게 찾고 활용하게 한다.","예측 분석용 맞춤형 ML 모델 구축·배포가 주 목적이다."],

 o:["에이전트가 간단하고 예측 가능한 고객 문의만 처리할 수 있게 해준다.","생성형 AI의 유연성을 활용하면서도 에이전트의 행동을 엄격하게 제어할 수 있게 해준다.","고객 상호작용에서 인간 상담원의 필요성을 없애준다.","일관성을 보장하기 위해 에이전트 응답을 사전 정의된 스크립트로 제한한다."],
 a:1,e:"하이브리드 접근 방식은 생성형 AI의 유연성을 누리면서도 동시에 규칙 기반(결정론적)으로 엄격한 통제가 가능하다는 이점이 있습니다."},
{q:"제공된 정보에 따르면 검색 증강 생성(RAG) 워크플로우에서 대형 언어 모델(LLM)은 데이터 저장소(data stores)와 어떻게 상호작용합니까?",
 o:["LLM은 데이터 저장소에서 수동적으로 정보를 수신하며 업데이트가 푸시되기를 기다린다.","LLM은 데이터 저장소를 사용하여 기본 지식과 매개변수를 영구적으로 확장한다.","LLM은 사용자의 요청과 관련된 정보를 검색하기 위해 데이터 저장소에 질의(query)하고, 이를 통해 응답을 풍부하게 만든다.","LLM은 응답 생성에 전적으로 데이터 저장소에만 의존하며 내부 지식은 무시한다."],
 a:2,e:"RAG 환경에서 LLM은 능동적으로 외부 데이터 저장소에 질의하여 관련 문맥을 불러온 뒤 답변을 생성합니다."},
{q:"다음 중 생성형 AI 에이전트 내에서 '추론 루프(reasoning loop)'의 기능을 가장 잘 설명하는 것은 무엇입니까?",
 o:["에이전트가 대화형 방식으로 사용자와 상호작용하고 프롬프트와 질문에 응답할 수 있게 한다.","에이전트가 편차 없이 따를 수 있는 일회성 지침 세트를 설정한다.","에이전트가 작업을 해결하기 위해 관찰, 내부 추론 및 의사 결정의 반복적인 과정을 거치도록 안내한다.","예측 가능한 행동을 보장하기 위해 에이전트의 행동을 사전 정의된 응답 세트로 제한한다."],
 a:2,e:"추론 루프는 에이전트가 상황을 관찰하고, 생각(추론)하고, 결정을 내려 행동하는 반복적 과정입니다."},
{q:"팀 회의 일정을 잡는 임무를 맡은 AI 에이전트가 있다고 상상해 보십시오. 에이전트는 팀원들의 캘린더에 접근하고, 적절한 시간대를 제안하며, 초대장을 보내야 합니다. 이 작업에 가장 필수적인 에이전트 도구의 조합은 무엇입니까?",
 o:["데이터 저장소(Data stores)와 함수(functions).","플러그인(Plugins)과 데이터 저장소(data stores).","함수(Functions)와 데이터베이스(databases).","확장 프로그램(Extensions)과 플러그인(plugins)."],
 a:3,e:"캘린더에서 일정을 확인하거나 초대장을 보내는 외부 시스템 연동에는 주로 Extensions(확장) 및 Plugin(플러그인)과 같은 API 도구가 사용됩니다."},
{q:"다음 중 생성형 AI의 맥락에서 멀티 에이전트 시스템(multi-agent system)의 개념을 가장 잘 보여주는 시나리오는 무엇입니까?",
 o:["데이터베이스, 웹 검색 API 등 여러 도구를 사용하여 작업을 완료하는 단일 AI 에이전트.","다양한 작업에 적응하기 위해 다양한 매개변수로 맞춤화할 수 있는 AI 에이전트.","예를 들어 여행 예약과 같은 복잡한 목표를 달성하기 위해 여러 전문 AI 에이전트가 협업하는 시스템.","이메일 작성 및 문서 요약과 같은 여러 작업을 수행할 수 있는 단일 AI 에이전트."],
 a:2,e:"멀티 에이전트 시스템은 전체 목표 달성을 위해 각기 다른 역할을 맡은 여러 특화 에이전트들이 협업하는 구조입니다."},
{q:"Google AI Studio에서 Gemini 출력의 무작위성(randomness)과 창의성을 제어하기 위해 조정해야 하는 매개변수는 무엇입니까?",
 o:["토큰 수 (Token count)","안전 설정 (Safety settings)","출력 길이 (Output length)","Temperature"],

{q:"타깃 사용자와 관련하여 Google AI Studio와 Vertex AI Studio의 주된 차이점은 무엇입니까?",
 o:["Google AI Studio는 맞춤형 모델 구축을 위한 것이고, Vertex AI Studio는 사전 학습된 모델 사용을 위한 것이다.","Google AI Studio는 코딩 경험이 필요한 반면, Vertex AI Studio는 모델과 상호작용하기 위한 노코드(no-code) 인터페이스를 제공한다.","Google AI Studio는 초보자와 실험용으로 설계된 반면, Vertex AI Studio는 전문가와 대규모 프로젝트를 대상으로 한다.","Google AI Studio는 이미지 생성 모델 액세스를 위한 것이고, Vertex AI Studio는 텍스트 기반 모델을 위한 것이다."],

{q:"Gemini for Google Cloud의 엔터프라이즈 보안 모델에 대한 설명 중 옳은 것은 무엇입니까?",
 o:["Google이 고객 데이터에 대한 액세스 및 권한을 통제한다.","고객 데이터는 공개적으로 접근 가능한 데이터셋에 포함된다.","고객 데이터는 타사 개발자와 공유된다.","고객 데이터는 암호화되며 액세스 제어가 적용된다."],

{q:"개발팀이 코딩 효율성과 협업을 향상시키려 합니다. 그들에게 가장 유익한 Gemini for Google Cloud 도구는 무엇입니까?",

{q:"문서에서 프롬프트를 복사하여 붙여넣는 방식으로 재사용하는 것과 비교할 때, Gemini의 저장된 정보(Saved info) 기능을 사용하는 것의 주요 이점은 무엇입니까?",
 o:["저장된 정보(Saved info)는 당신의 직무나 회사 세부 정보와 같은 특정 정보가 모든 Gemini 대화에 일관되게 적용되도록 보장한다.","저장된 정보는 모든 동료와 자동으로 공유되어 협업을 촉진한다.","저장된 정보는 Gemini 비밀번호를 저장하는 곳이다.","저장된 정보를 통해 굵은 글씨체나 글머리 기호 같은 더 풍부한 서식을 프롬프트에 저장할 수 있다."],
 a:0,e:"'Saved info(저장된 정보)'는 사용자의 배경 맥락을 영구적으로 저장하여 일일이 다시 입력할 필요 없이 일관되게 적용해줍니다."},
{q:"그라운딩(grounding)은 Gemini에서 Gem의 신뢰성을 어떻게 향상시킵니까?",
 o:["Gem이 사용자 상호작용에서 학습하여 시간이 지남에 따라 응답을 개선할 수 있게 한다.","Gem이 인터넷의 어떤 웹사이트 정보든 접근하고 처리할 수 있게 한다.","Gem의 출력을 구체적이고 검증 가능한 정보 출처와 연결한다.","Gem이 부정확한 응답을 생성하는 것을 완전히 방지한다."],

{q:"당신은 신제품 출시에 대해 논의할 회의를 준비 중인 제품 관리자입니다. Google 드라이브에는 시장 조사 보고서, 경쟁사 분석 및 고객 피드백 설문조사가 저장되어 있습니다. NotebookLM이 이 회의 준비를 어떻게 도울 수 있습니까?",
 o:["NotebookLM은 문서에서 주요 결과를 요약하고, 잠재적 과제를 식별하며, 논의할 핵심 주제를 제공하여 생산적인 회의를 이끌도록 도울 수 있다.","NotebookLM은 팀원들의 성격에 기반하여 그들이 할 질문을 예측하고 답변을 미리 준비할 수 있다.","NotebookLM은 추천 의제와 함께 모든 회의 참석자에게 캘린더 초대장을 자동으로 보낼 수 있다.","NotebookLM은 회의용 슬라이드와 스크립트가 포함된 프레젠테이션을 자동으로 생성할 수 있다."],
 a:0,e:"NotebookLM은 업로드된 여러 소스 문서를 기반으로 핵심 인사이트를 연결하고 요약하는데 최적화되어 있습니다."},
{q:"AI 모델에서 RAG(Retrieval-Augmented Generation, 검색 증강 생성)의 주요 기능은 무엇입니까?",
 o:["방대한 양의 정보를 암기하는 AI 모델의 능력을 향상시킨다.","AI 모델의 출력을 사전 정의된 응답 세트로 제한한다.","AI 모델이 출력을 생성할 때 외부 지식 소스에 접근하고 활용할 수 있게 한다.","AI 모델의 출력 생성 과정에서 인간의 개입을 대체한다."],

{q:"팀 프로젝트에 NotebookLM Enterprise를 사용할 때의 주요 이점은 무엇입니까?",

{q:"당신은 블로그 글, SNS 캡션, 웹사이트 문구 등 다양한 유형의 콘텐츠를 제작하는 프리랜서 작가입니다. 프로젝트에 따라 다양한 글쓰기 스타일과 어조 사이를 자주 전환해야 합니다. 작업 흐름을 간소화하고 다양한 형식에 걸쳐 일관된 글쓰기를 보장하려고 합니다. 요구 사항에 가장 적합한 Gemini의 기능은 무엇입니까?",

{q:"당신은 다양한 시간대에 위치한 동료들과 Google Meet로 화상 회의를 이끌고 있습니다. 일부 참석자들은 언어 장벽 때문에 논의를 이해하는 데 어려움을 겪고 있습니다. Gemini가 이 Google Meet 화상 회의를 어떻게 지원할 수 있습니까?",
 o:["Gemini는 회의 채팅에 음성 대화의 번역된 요약을 제공할 수 있다.","Gemini는 화자 식별 기능이 포함된 실시간 번역 자막을 생성하여, 언어나 억양 차이에 관계없이 모두가 쉽게 따라갈 수 있게 해준다.","Gemini는 모두가 동일하게 잘 들을 수 있도록 각 화자의 볼륨을 자동으로 조절할 수 있다.","Gemini는 회의에 참석하지 못한 사람들을 위해 논의 내용을 자동으로 요약할 수 있다."],

{q:"프롬프트에 예시를 전혀 제공하지 않고 파운데이션 모델의 기존 지식에만 전적으로 의존하는 프롬프팅 기법은 무엇입니까?",

{q:"역할(Role) 프롬프팅을 사용할 때의 주된 이점은 무엇입니까?",
 o:["AI 모델이 몇 가지 예시를 통해 학습할 수 있게 해준다.","출장 일정 계획과 같은 복잡한 작업을 가능하게 한다.","AI에 특정 페르소나를 부여하여 응답의 스타일, 어조 및 초점에 영향을 준다.","복잡한 질문을 이해하는 AI 모델의 능력을 향상시킨다."],

{q:"언어 학습 앱을 설계 중이며 대화 연습을 하는 학생들에게 개인화된 피드백을 제공할 수 있는 AI 튜터를 통합하고자 합니다. AI와 학생의 상호작용을 안내하는 데 가장 효과적인 역할 프롬프트는 무엇입니까?",

{q:"한 여행사가 고객의 휴가 계획을 돕기 위해 AI 에이전트를 사용하려고 합니다. 이 AI 기반 여행 계획 경험을 만들기 위해 '에이전트(agents)' 계층과 '애플리케이션(applications)' 계층은 어떻게 함께 작동합니까?",

{q:"게임 개발자가 게임 내에서 더 현실적이고 참여를 유도하는 NPC(비플레이어 캐릭터)를 만들고자 합니다. 이 AI 기반 NPC의 행동과 기능을 정의하는 데 생성형 AI 환경의 어느 계층이 가장 중요합니까?",

{q:"AI 에이전트를 독립 실행형 AI 모델(standalone AI models)과 구별하는 두 가지 핵심 요소는 무엇입니까?",

{q:"Vertex AI에서 제공하는 옵션 중, 기존 구글이나 타사 오픈소스 모델을 선택하는 것이 아니라, 사용자가 직접 조직의 자체 모델을 학습(train)시키고 활용하고자 할 때 선택해야 하는 기능은 무엇입니까? [cite: 812]",

{q:"디바이스(모바일 등) 상에서 직접 실행되도록 특별히 설계된 구글의 가장 효율적이고 콤팩트한 AI 모델은 무엇입니까? [cite: 807]",

{q:"사용자가 파일을 업로드하면 해당 소스 자료에 기반(grounding)하여 핵심 포인트를 요약하고, 질문에 답하며, 아이디어를 생성하는 '연구 어시스턴트(research assistant)' 역할을 하는 도구는 무엇입니까? [cite: 845]",

{q:"프롬프팅(Prompting) 기법 중, 모델에게 페르소나(Persona)를 부여하여 응답의 스타일, 어조 및 초점에 영향을 미치게 하는 방법은 무엇입니까? [cite: 825]",

{q:"챗봇에 실제 대화와 같은 자연스러운 느낌을 주기 위해 대형 언어 모델(LLM)을 사용하고 자연어로 정의되는 에이전트의 유형은 무엇입니까? [cite: 867]",

{q:"문제 해결 과정을 안내하기 위해 '중간 추론 단계'가 포함된 예시를 제공하여 대형 언어 모델(LLM)을 돕는 프롬프트 엔지니어링 기법은 무엇입니까? [cite: 881]",

/* ===== 상태 ===== */
let cfg={count:93,mode:"instant",shuffle:true};
let order=[], idx=0, answers=[], revealed=[];

function bindSeg(id,key,parse){
  document.querySelectorAll('#'+id+' button').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); cfg[key]=parse(b.dataset.v);
    };
  });
}
bindSeg('seg-count','count',v=>+v);
bindSeg('seg-mode','mode',v=>v);
bindSeg('seg-shuffle','shuffle',v=>v==='1');

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function buildOrder(){
  let ids=[...Array(BANK.length).keys()];
  if(cfg.shuffle) shuffle(ids);
  ids=ids.slice(0,Math.min(cfg.count,BANK.length));
  return ids.map(i=>{
    const B=BANK[i];
    const correct=Array.isArray(B.a)?B.a:[B.a];
    let opts=B.o.map((t,oi)=>({t,correct:correct.includes(oi)}));
    if(cfg.shuffle) shuffle(opts);
    const correctIdxs=opts.map((o,k)=>o.correct?k:-1).filter(k=>k>=0);
    return {q:B.q,e:B.e,multi:!!B.multi,opts,correctIdxs};
  });
}

function startExam(){
  order=buildOrder(); idx=0;
  answers=new Array(order.length).fill(null);
  revealed=new Array(order.length).fill(false);
  document.getElementById('start').classList.add('hide');
  document.getElementById('result').classList.add('hide');
  document.getElementById('quiz').classList.remove('hide');
  renderQ();
}
function retry(){ startExam(); }

function renderQ(){
  const item=order[idx];
  document.getElementById('qcount').textContent=`문제 ${idx+1} / ${order.length}`;
  document.getElementById('modeLabel').textContent=cfg.mode==='instant'?'학습 모드':'실전 모드';
  document.getElementById('prog').style.width=(idx/order.length*100)+'%';
  document.getElementById('qtext').textContent=item.q;
  document.getElementById('hint').textContent=item.multi?'✓ 정답 2개를 선택하세요':'';
  const wrap=document.getElementById('choices'); wrap.innerHTML='';
  const ex=document.getElementById('explain'); ex.className='explain'; ex.innerHTML='';

  const sel=answers[idx];
  const selArr=Array.isArray(sel)?sel:(sel===null?[]:[sel]);
  const revealedNow=item.multi?revealed[idx]:(sel!==null&&cfg.mode==='instant');
  const letters=['A','B','C','D','E'];

  item.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML=`<span class="dot">${letters[i]}</span><span>${o.t}</span>`;
    if(revealedNow){
      btn.disabled=true;
      if(item.correctIdxs.includes(i)) btn.classList.add('correct');
      else if(selArr.includes(i)) btn.classList.add('wrong');
    } else if(selArr.includes(i)) btn.classList.add('sel');
    btn.onclick=()=>choose(i);
    wrap.appendChild(btn);
  });

  if(revealedNow) showExplain();

  const nb=document.getElementById('nextBtn');
  let show=false,label='',handler=null;
  const last=(idx===order.length-1);
  if(item.multi){
    if(cfg.mode==='instant' && !revealed[idx]){
      if(selArr.length>0){show=true;label='정답 확인';handler=checkMulti;}
    } else if(selArr.length>0){show=true;label=last?'채점하기':'다음';handler=nextQ;}
  } else if(sel!==null){show=true;label=last?'채점하기':'다음';handler=nextQ;}
  if(show){nb.classList.remove('hide');nb.textContent=label;nb.onclick=handler;}
  else nb.classList.add('hide');
}

function choose(i){
  const item=order[idx];
  if(item.multi){
    if(revealed[idx]) return;
    let arr=Array.isArray(answers[idx])?answers[idx].slice():[];
    if(arr.includes(i)) arr=arr.filter(x=>x!==i);
    else { if(arr.length>=item.correctIdxs.length) arr.shift(); arr.push(i); }
    answers[idx]=arr; renderQ();
  } else {
    if(answers[idx]!==null && cfg.mode==='instant') return;
    answers[idx]=i; renderQ();
  }
}
function checkMulti(){ revealed[idx]=true; renderQ(); }

function showExplain(){
  const item=order[idx], ex=document.getElementById('explain');
  let ok;
  if(item.multi){
    const s=Array.isArray(answers[idx])?answers[idx]:[];
    ok=s.length===item.correctIdxs.length && item.correctIdxs.every(c=>s.includes(c));
  } else ok=answers[idx]===item.correctIdxs[0];
  ex.className='explain show '+(ok?'ok':'no');
  const letters=['A','B','C','D','E'];
  const ans=item.correctIdxs.map(k=>letters[k]+'. '+item.opts[k].t).join('<br>');
  ex.innerHTML=`<b>${ok?'✅ 정답입니다':'❌ 오답입니다'}</b>
    <span class="ans">정답: ${ans}</span>
    <div style="margin-top:8px">${item.e}</div>`;
}

function nextQ(){
  if(idx<order.length-1){ idx++; renderQ(); } else finish();
}

function isCorrect(it,ans){
  if(it.multi){
    const s=Array.isArray(ans)?ans:[];
    return s.length===it.correctIdxs.length && it.correctIdxs.every(c=>s.includes(c));
  }
  return ans===it.correctIdxs[0];
}

function finish(){
  let c=0;
  order.forEach((it,i)=>{ if(isCorrect(it,answers[i])) c++; });
  const total=order.length, pct=Math.round(c/total*100), pass=pct>=75;
  document.getElementById('quiz').classList.add('hide');
  document.getElementById('result').classList.remove('hide');
  document.getElementById('ring').style.background=`conic-gradient(${pass?'#188038':'#e37400'} ${pct}%, #e8ebf3 0)`;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('ratio').textContent=`${c} / ${total}`;
  const v=document.getElementById('verdict');
  v.textContent=pass?'🎉 합격 기준 통과!':'📚 조금 더 복습이 필요해요';
  v.className='verdict '+(pass?'pass':'fail');
  document.getElementById('nCorrect').textContent=c;
  document.getElementById('nWrong').textContent=total-c;

  const rev=document.getElementById('review'); rev.innerHTML='';
  const wrongs=order.map((it,i)=>({it,i})).filter(x=>!isCorrect(x.it,answers[x.i]));
  if(wrongs.length){
    const h=document.createElement('h3'); h.textContent=`오답 리뷰 (${wrongs.length}문항)`; rev.appendChild(h);
    wrongs.forEach(({it,i})=>{
      const ans=answers[i];
      const your=(ans===null||(Array.isArray(ans)&&!ans.length))?'(미응답)':
        (Array.isArray(ans)?ans.map(k=>it.opts[k].t).join(' / '):it.opts[ans].t);
      const right=it.correctIdxs.map(k=>it.opts[k].t).join(' / ');
      const d=document.createElement('div'); d.className='rev-item';
      d.innerHTML=`<div class="q">Q. ${it.q}</div>
        <div class="yours">✗ 내 답: ${your}</div>
        <div class="right">✓ 정답: ${right}</div>
        <div class="ex">${it.e}</div>`;
      rev.appendChild(d);
    });
  }else{
    const h=document.createElement('h3'); h.textContent='완벽합니다! 오답이 없어요 👏'; rev.appendChild(h);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
